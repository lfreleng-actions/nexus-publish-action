---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# nexus-publish-action
name: '📦 Nexus Publishing'

description: 'Publishes content to Sonatype Nexus Repository servers'
# Uploading tool supporting 20+ Nexus repository formats

inputs:
  # Mandatory
  nexus_server:
    description: 'Nexus server URL (e.g., https://nexus.example.com)'
    required: true
  nexus_password:
    description: 'Nexus password for authentication'
    required: true
  repository_name:
    description: 'Nexus repository name'
    required: true
  files_path:
    description: 'Path to files directory or specific file to upload'
    required: true
  # Optional
  nexus_username:
    description: 'Nexus username for authentication'
    required: false
  file_pattern:
    description: 'File pattern, valid when specified path is a directory'
    # e.g., '*.tgz', '*.jar', '*.whl', '*'
    required: false
    default: '*'
  repository_format:
    description: 'Repository format/type'
    required: false
    default: 'raw'
  upload_path:
    # Caution: format-specific
    description: 'Upload path within the repository'
    required: false
    default: ''
  coordinates:
    # Caution: format-specific
    description: 'Artifact coordinates'
    # e.g. 'groupId=com.example artifactId=app version=1.0.0' for Maven)
    required: false
    default: ''
  metadata:
    # Caution: format-specific
    description: 'Additional metadata as JSON string'
    required: false
    default: '{}'
  validate_checksum:
    description: 'Validate file checksums before upload'
    required: false
    default: 'true'
  permit_fail:
    # Important; this is the default behaviour, publishing failures permitted
    description: 'Do not exit/error when some content fails to upload'
    required: false
    default: 'false'
  fail_fast:
    description: 'Stop on first failure (when permit_fail is false)'
    required: false
    default: 'true'

outputs:
  published_files:
    description: 'List of successfully published files'
    value: "${{ steps.publish.outputs.published_files }}"
  publication_count:
    description: 'Number of files successfully published'
    value: "${{ steps.publish.outputs.publication_count }}"
  failed_count:
    description: 'Number of files that failed to publish'
    value: "${{ steps.publish.outputs.failed_count }}"
  failed_files:
    description: 'List of files that failed to publish'
    value: "${{ steps.publish.outputs.failed_files }}"

runs:
  using: 'composite'
  steps:
    - name: 'Validate inputs'
      id: validate
      shell: bash
      run: |
        # Validate inputs
        echo 'Validating inputs...'

        # Define required inputs
        required_inputs=("nexus_server" "nexus_password" \
          "repository_name" "files_path")

        # Check required inputs
        for input in "${required_inputs[@]}"; do
          case "$input" in
            "nexus_server")
              if [ -z "${{ inputs.nexus_server }}" ]; then
                echo 'Error: nexus_server is required ❌'
                exit 1
              fi
              ;;
            "nexus_password")
              if [ -z "${{ inputs.nexus_password }}" ]; then
                echo 'Error: nexus_password is required ❌'
                exit 1
              fi
              ;;
            "repository_name")
              if [ -z "${{ inputs.repository_name }}" ]; then
                echo 'Error: repository_name is required ❌'
                exit 1
              fi
              ;;
            "files_path")
              if [ -z "${{ inputs.files_path }}" ]; then
                echo 'Error: files_path is required ❌'
                exit 1
              fi
              ;;
          esac
        done

        # Validate repository format
        format="${{ inputs.repository_format }}"
        valid_formats=("raw" "maven2" "maven2_upload" "npm" "docker" \
          "helm" "pypi" "nuget" "rubygems" "apt" "yum" "rpm" "composer" \
          "conan" "conda" "r" "go" "p2" "gitlfs" "cocoapods" "bower")

        format_valid=false
        for valid_format in "${valid_formats[@]}"; do
          if [ "$format" = "$valid_format" ]; then
            format_valid=true
            break
          fi
        done

        if [ "$format_valid" = false ]; then
          echo "Error: Invalid repository format '$format' ❌"
          echo "Supported formats: ${valid_formats[*]}"
          exit 1
        fi

        echo 'All required inputs validated ✅'
        echo "Repository format: $format"

    - name: 'Publish artifacts to Nexus'
      id: publish
      shell: bash
      run: |
        # Publish artifacts to Nexus Repository
        #
        # SECURITY NOTES:
        # This script implements several defensive security patterns to prevent
        # credential leakage in logs, process lists, and debug output:
        #
        # 1. BRACE SYNTAX FOR TRACE CONTROL: { set +x; } 2>/dev/null
        #    - Creates compound command with comprehensive stderr suppression
        #    - More defensive than 'set +x 2>/dev/null' against shell edge cases
        #    - Protects against unexpected diagnostic output from builtins
        #    - Used specifically for most critical credential operations
        #
        # 2. GLOBAL VARIABLE: local -g nexus_user nexus_pass netrc_file
        #    - Creates globals within protected function scope
        #    - Ensures atomic initialization under disabled tracing
        #    - Prevents variables from existing in uninitialized state
        #    - Controls exactly when/how sensitive variables are created
        #
        # 3. NETRC FILE: Secure .netrc file with restrictive permissions
        #    - Writes credentials to temporary .netrc file once
        #    - Uses chmod 600 for file-level security
        #    - Eliminates repeated credential printf statements
        #    - Automatic cleanup via trap ensures no credential persistence
        #
        # 4. STDERR SUPPRESSION: 2>/dev/null in curl commands
        #    - Deliberate security choice for checksum uploads
        #    - Prevents curl error messages from exposing credentials
        #    - Used selectively where error visibility isn't critical
        #
        # These patterns prioritize security over simplicity. Do not "optimize"
        # without understanding the credential protection implications.

        set -euo pipefail

        # Input variables
        nexus_url="${{ inputs.nexus_server }}"
        repo_name="${{ inputs.repository_name }}"
        repo_format="${{ inputs.repository_format }}"
        files_path="${{ inputs.files_path }}"
        file_pattern="${{ inputs.file_pattern }}"
        upload_path="${{ inputs.upload_path }}"
        coordinates="${{ inputs.coordinates }}"
        metadata="${{ inputs.metadata }}"
        validate_checksum="${{ inputs.validate_checksum }}"
        fail_fast="${{ inputs.fail_fast }}"

        # Secure credential assignment function
        assign_credentials() {
          # Function to handle credential assignment securely
          local -g nexus_user nexus_pass netrc_file  # See SECURITY NOTES: #2

          { set +x; } 2>/dev/null  # See SECURITY NOTES: pattern #1
          nexus_user="${{ inputs.nexus_username }}"
          nexus_pass="${{ inputs.nexus_password }}"

          # Create secure .netrc file for credential management
          netrc_file=$(mktemp)
          chmod 600 "$netrc_file"

          # Extract hostname from nexus_url for .netrc machine entry
          nexus_host=$(echo "$nexus_url" | \
            sed -E 's|^https?://||' | sed 's|/.*||')

          { set -x; } 2>/dev/null  # See SECURITY NOTES: #1

          # Default username to the GitHub repository name if not provided
          # (matches the documented default in README.md)
          if [ -z "$nexus_user" ]; then
            nexus_user="${GITHUB_REPOSITORY##*/}"
          fi

          { set +x; } 2>/dev/null  # See SECURITY NOTES: pattern #1
          # Write credentials to .netrc file once
          printf 'machine %s login %s password %s\n' \
            "$nexus_host" "$nexus_user" "$nexus_pass" > "$netrc_file"
          { set -x; } 2>/dev/null  # See SECURITY NOTES: #1
        }

        # Assign credentials securely
        assign_credentials

        # Remove trailing slash from nexus_url
        nexus_url=$(echo "$nexus_url" | sed 's|/$||')

        # Function to calculate checksums
        calculate_checksums() {
          local file="$1"
          md5sum=$(md5sum "$file" | awk '{print $1}')
          sha1sum=$(sha1sum "$file" | awk '{print $1}')
          sha256sum=$(sha256sum "$file" | awk '{print $1}')
        }

        # Function to get format-specific upload URL
        get_upload_url() {
          local format="$1"
          local filename="$2"
          local coordinates="$3"
          local upload_path="$4"

          case "$format" in
            "maven2_upload")
              # Maven upload format for pre-built m2repo directory trees.
              # Preserves the relative path from files_path as the URL path.
              # Uses Nexus 2.x content API: /content/repositories/<repo>/
              # The relative path is passed via upload_path by the caller.
              if [ -z "$upload_path" ]; then
                echo "Error: maven2_upload requires upload_path" >&2
                return 1
              fi
              local base="${nexus_url}/content/repositories"
              echo "${base}/${repo_name}/${upload_path}"
              ;;
            "maven2")
              # Maven format: /groupId/artifactId/version/filename
              # Parse coordinates
              groupId=$(echo "$coordinates" | \
                sed -n 's/.*groupId=\([^ ]*\).*/\1/p')
              artifactId=$(echo "$coordinates" | \
                sed -n 's/.*artifactId=\([^ ]*\).*/\1/p')
              version=$(echo "$coordinates" | \
              sed -n 's/.*version=\([^ ]*\).*/\1/p')
              classifier=$(echo "$coordinates" | \
                sed -n 's/.*classifier=\([^ ]*\).*/\1/p')

              if [ -z "$groupId" ] || [ -z "$artifactId" ] || \
                [ -z "$version" ]; then
                echo 'Error: Maven format requires:'
                echo 'groupId, artifactId, and version coordinates'
                return 1
              fi

              # Convert groupId dots to slashes
              group_path=$(echo "$groupId" | tr '.' '/')
              base_name="${artifactId}-${version}"
              if [ -n "$classifier" ]; then
                base_name="${base_name}-${classifier}"
              fi
              base_url="${nexus_url}/repository/${repo_name}/${group_path}"
              echo "${base_url}/${artifactId}/${version}/${filename}"
              ;;
            "npm")
              # npm format: /@scope/package/-/package-version.tgz or
              # /package/-/package-version.tgz
              package_name=$(echo "$filename" | sed 's/-[0-9].*//')
              if [[ "$package_name" == @* ]]; then
                base_url="${nexus_url}/repository/${repo_name}/${package_name}"
                echo "${base_url}/-/${filename}"
              else
                base_url="${nexus_url}/repository/${repo_name}/${package_name}"
                echo "${base_url}/-/${filename}"
              fi
              ;;
            "pypi")
              # PyPI format: /packages/source/f/first-letter/package_name/
              # filename
              package_name=$(echo "$filename" | sed 's/-[0-9].*//')
              first_letter=$(echo "$package_name" | cut -c1 |
                           tr '[:upper:]' '[:lower:]')
              base_url="${nexus_url}/repository/${repo_name}/packages"
              base_url="${base_url}/source"
              file_url="${base_url}/${first_letter}/${package_name}"
              file_url="${file_url}/${filename}"
              echo "$file_url"
              ;;
            "nuget")
              # NuGet format: /package_name/version/filename
              package_name=$(echo "$coordinates" |
                           sed -n 's/.*id=\([^ ]*\).*/\1/p')
              version=$(echo "$coordinates" |
                      sed -n 's/.*version=\([^ ]*\).*/\1/p')
              if [ -z "$package_name" ] || [ -z "$version" ]; then
                package_name=$(echo "$filename" | sed 's/\.[0-9].*//')
                version=$(echo "$filename" |
                        sed -n 's/.*\.\([0-9][0-9.]*\)\.nupkg/\1/p')
              fi
              base_url="${nexus_url}/repository/${repo_name}/${package_name}"
              echo "${base_url}/${version}/${filename}"
              ;;
            "helm")
              # Helm format: Nexus typically stores helm charts in raw format
              # Some Nexus installations might require specific paths for helm
              if [ -n "$upload_path" ]; then
                upload_path=$(echo "$upload_path" | sed 's|^/||; s|/$||')
                base_url="${nexus_url}/repository/${repo_name}/${upload_path}"
                echo "${base_url}/${filename}"
              else
                echo "${nexus_url}/repository/${repo_name}/${filename}"
              fi
              ;;
            "docker")
              echo 'Error: Docker format requires special handling'
              echo '       with registry API'
              return 1
              ;;
            *)
              # Default to raw format
              if [ -n "$upload_path" ]; then
                upload_path=$(echo "$upload_path" | sed 's|^/||; s|/$||')
                base_url="${nexus_url}/repository/${repo_name}/${upload_path}"
                echo "${base_url}/${filename}"
              else
                echo "${nexus_url}/repository/${repo_name}/${filename}"
              fi
              ;;
          esac
        }

        # Secure credential handling functions
        # These functions use .netrc file approach to keep credentials
        # out of logs, process lists, and debug output

        # Function to securely upload a file using curl --netrc
        secure_upload_file() {
          local file="$1"
          local upload_url="$2"
          local content_type="${3:-application/octet-stream}"

          # Use .netrc file for secure credential management
          # NOTE: -f flag deliberately omitted so that the Nexus
          # response body is captured on HTTP errors (4xx/5xx),
          # enabling detailed error diagnostics downstream.
          curl -s --max-redirs 0 -w '%{http_code}\n' \
            --connect-timeout 30 --max-time 300 \
            --netrc-file "$netrc_file" \
            -H "Content-Type: $content_type" \
            --upload-file "$file" \
            "$upload_url" \
            2>&1
        }

        # Function to securely upload checksums
        # Returns 0 on success, 1 on failure; prints diagnostics
        secure_upload_checksum() {
          local checksum_value="$1"
          local checksum_url="$2"
          local checksum_type="${3:-checksum}"

          local ck_resp ck_exit ck_http
          ck_resp=$(printf '%s' "$checksum_value" | curl -s \
            --connect-timeout 10 --max-time 30 \
            -w '%{http_code}' \
            --netrc-file "$netrc_file" \
            --data-binary @- \
            "$checksum_url" \
            2>/dev/null)  # See SECURITY NOTES: #4
          ck_exit=$?

          ck_http="${ck_resp: -3}"
          if [ $ck_exit -ne 0 ]; then
            echo "  ⚠️  ${checksum_type} upload failed (curl exit $ck_exit)"
            return 1
          elif ! [[ "$ck_http" =~ ^2[0-9][0-9]$ ]]; then
            echo "  ⚠️  ${checksum_type} upload failed (HTTP $ck_http)"
            return 1
          fi
          return 0
        }

        # Function to securely upload PyPI files using multipart
        secure_upload_pypi() {
          local file="$1"
          local upload_url="$2"

          # NOTE: -f flag deliberately omitted (see secure_upload_file)
          curl -s --max-redirs 0 -w '%{http_code}\n' \
            --connect-timeout 30 --max-time 300 \
            --netrc-file "$netrc_file" \
            -F "content=@${file}" \
            "$upload_url" \
            2>&1
        }

        # Function to perform secure upload with debug mode protection
        perform_secure_upload() {
          local file="$1"
          local upload_url="$2"
          local format="$3"

          # Isolate credential operations in a subshell to prevent
          # debug exposure
          (
            # Disable command tracing for this subshell even if globally enabled
            # Less critical than credential assignment (pattern #1)
            set +x 2>/dev/null

            # All credential operations happen here, isolated from
            # logging
            case "$format" in
              "maven2"|"maven2_upload")
                secure_upload_file "$file" "$upload_url" \
                  "application/octet-stream"
                ;;
              "npm")
                secure_upload_file "$file" "$upload_url" \
                  "application/x-compressed"
                ;;
              "pypi")
                secure_upload_pypi "$file" "$upload_url"
                ;;
              *)
                secure_upload_file "$file" "$upload_url"
                ;;
            esac
          )
        }

        # Translate Nexus HTTP status codes into actionable messages.
        # Modelled on lftools deploy.py _request_put_file error handling.
        format_http_error() {
          local http_code="$1"
          case "$http_code" in
            400) echo "Repository is read-only or malformed request" ;;
            401) echo "Authentication failed: invalid credentials" ;;
            403) echo "Authorisation denied: insufficient permissions" ;;
            404) echo "Repository or upload path not found" ;;
            405) echo "HTTP method not allowed by this endpoint" ;;
            413) echo "File too large for the server to accept" ;;
            500) echo "Nexus internal server error" ;;
            502) echo "Bad gateway (proxy in front of Nexus?)" ;;
            503) echo "Nexus unavailable (starting up or overloaded)" ;;
            504) echo "Gateway timeout reaching Nexus" ;;
            *)   echo "Unexpected HTTP status: $http_code" ;;
          esac
        }

        # Translate curl exit codes into human-readable network errors.
        format_curl_error() {
          local exit_code="$1"
          case "$exit_code" in
            5)  echo "Could not resolve proxy" ;;
            6)  echo "DNS resolution failed: could not resolve host" ;;
            7)  echo "Connection refused or could not connect" ;;
            22) echo "HTTP error (server returned an error page)" ;;
            26) echo "Read error on local file" ;;
            28) echo "Operation timed out" ;;
            35) echo "SSL/TLS handshake failed" ;;
            47) echo "Too many redirects" ;;
            52) echo "Server returned nothing (empty reply)" ;;
            55) echo "Network send error" ;;
            56) echo "Network receive error" ;;
            *)  echo "curl failed with exit code: $exit_code" ;;
          esac
        }

        # Extract a short diagnostic from a Nexus response body.
        # Nexus 2.x returns XML (<msg>); Nexus 3.x often returns JSON
        # or plain text.  We try each in turn and fall back to the raw
        # body (truncated).
        extract_nexus_message() {
          local body="$1"
          local msg

          # Nexus 2.x XML: <msg>...</msg>
          msg=$(echo "$body" | \
            sed -n 's/.*<msg>\(.*\)<\/msg>.*/\1/p' | head -n 1)
          if [ -n "$msg" ]; then echo "$msg"; return; fi

          # Nexus 3.x JSON: "message": "..."
          msg=$(echo "$body" | \
            sed -n 's/.*"message"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' \
            | head -n 1)
          if [ -n "$msg" ]; then echo "$msg"; return; fi

          # Fallback: first 200 characters of the body, if non-empty
          if [ -n "$body" ]; then
            echo "${body:0:200}"
          fi
        }

        # Function to upload file with format-specific logic
        upload_file() {
          local file="$1"
          local filename
          filename=$(basename "$file")

          echo "🔍 Processing: $filename for format: $repo_format"

          # Calculate checksums if validation is enabled
          if [ "$validate_checksum" = "true" ]; then
            calculate_checksums "$file"
            echo "  MD5: $md5sum"
            echo "  SHA1: $sha1sum"
            echo "  SHA256: $sha256sum"
          fi

          # For maven2_upload, compute relative path from files_path root
          # Use local variable to avoid mutating global upload_path
          local effective_upload_path="$upload_path"
          if [ "$repo_format" = "maven2_upload" ]; then
            local files_root="${files_path%/}"
            local rel_path="${file#${files_root}/}"
            if [ "$rel_path" = "$file" ]; then
              echo "❌ File $file is not under files_path $files_root"
              return 1
            fi
            effective_upload_path="$rel_path"
          fi

          # Get upload URL
          local upload_url
          upload_url=$(get_upload_url "$repo_format" \
            "$filename" "$coordinates" "$effective_upload_path")
          if [ $? -ne 0 ]; then
            echo "❌ Failed to determine upload URL for $filename"
            return 1
          fi

          echo "📤 Uploading: $filename"
          echo "   Format: $repo_format"
          echo "   Repository: $repo_name"
          echo "   URL: $upload_url"

          # Execute secure upload using protected wrapper
          local response http_code response_body curl_exit_code
          response=$(perform_secure_upload \
            "$file" "$upload_url" "$repo_format")
          curl_exit_code=$?

          # Extract HTTP status code from the response
          # (last line due to -w '%{http_code}\n')
          http_code=$(echo "$response" | tail -n 1)
          # Remove last line (cross-platform compatible)
          response_body=$(echo "$response" | sed '$d')

          # ----------------------------------------------------------
          # Network / transport-level failure (curl returned non-zero)
          # ----------------------------------------------------------
          if [ "$curl_exit_code" -ne 0 ]; then
            local curl_reason
            curl_reason=$(format_curl_error "$curl_exit_code")
            echo "   ❌ Failed to upload: $filename"
            echo "   Reason: $curl_reason"
            echo "   curl exit code: $curl_exit_code"
            if [ -n "$http_code" ] && [ "$http_code" != "000" ]; then
              echo "   HTTP Status: $http_code"
            fi
            if [ -n "$response_body" ]; then
              echo "   Response: ${response_body:0:500}"
            fi
            echo "   Target: $upload_url"
            return 1
          fi

          # ----------------------------------------------------------
          # HTTP-level success (2xx)
          # ----------------------------------------------------------
          if [[ "$http_code" =~ ^2[0-9][0-9]$ ]]; then
            # Guard against misleading 2xx with an HTML error page
            if echo "$response_body" | \
               grep -qi '<html>'; then
              echo "   ❌ Failed to upload: $filename"
              echo "   HTTP $http_code returned HTML error page"
              local nexus_msg
              nexus_msg=$(extract_nexus_message "$response_body")
              if [ -n "$nexus_msg" ]; then
                echo "   Nexus message: $nexus_msg"
              fi
              echo "   Target: $upload_url"
              return 1
            fi

            echo "   ✅ Uploaded: $filename (HTTP $http_code)"

            # Upload checksums when enabled for supported formats
            if [ "$validate_checksum" = "true" ] &&
               [[ "$repo_format" =~ ^(maven2|raw)$ ]]; then
              local ck_failures=0
              secure_upload_checksum "$md5sum" \
                "${upload_url}.md5" "MD5" || \
                ck_failures=$((ck_failures + 1))
              secure_upload_checksum "$sha1sum" \
                "${upload_url}.sha1" "SHA1" || \
                ck_failures=$((ck_failures + 1))
              secure_upload_checksum "$sha256sum" \
                "${upload_url}.sha256" "SHA256" || \
                ck_failures=$((ck_failures + 1))
              if [ "$ck_failures" -eq 0 ]; then
                echo '  📋 Checksums uploaded'
              else
                echo "  ⚠️  $ck_failures/3 checksum uploads failed"
              fi
            fi

            return 0
          fi

          # ----------------------------------------------------------
          # HTTP-level failure (non-2xx)
          # ----------------------------------------------------------
          local http_reason nexus_msg
          http_reason=$(format_http_error "$http_code")
          nexus_msg=$(extract_nexus_message "$response_body")

          echo "   ❌ Failed to upload: $filename"
          echo "   HTTP Status: $http_code — $http_reason"
          if [ -n "$nexus_msg" ]; then
            echo "   Nexus message: $nexus_msg"
          elif [ -n "$response_body" ]; then
            echo "   Response: ${response_body:0:500}"
          fi
          echo "   Target: $upload_url"
          return 1
        }

        # Cleanup function to remove .netrc file
        cleanup_credentials() {
          if [ -n "${netrc_file:-}" ] && [ -f "$netrc_file" ]; then
            { set +x; } 2>/dev/null  # See SECURITY NOTES: #1
            rm -f "$netrc_file"
            { set -x; } 2>/dev/null  # See SECURITY NOTES: #1
          fi
        }

        # Ensure cleanup happens on script exit
        trap cleanup_credentials EXIT

        # Prepare upload path
        if [ -n "$upload_path" ]; then
          upload_path=$(echo "$upload_path" | sed 's|^/||; s|/$||')
          if [ -n "$upload_path" ]; then
            upload_path="/${upload_path}"
          fi
        fi

        published_files=""
        failed_files=""
        publication_count=0
        failed_count=0

        echo '🚀 Starting Nexus Publishing/Upload'
        echo '📋 Configuration:'
        echo "   Server: $nexus_url"
        echo "   Repository: $repo_name"
        echo "   Format: $repo_format"
        echo "   Files path: $files_path"
        echo "   File pattern: $file_pattern"
        if [ -n "$upload_path" ]; then
          echo "   Upload path: $upload_path"
        fi
        if [ -n "$coordinates" ]; then
          echo "   Coordinates: $coordinates"
        fi
        echo "   Permit fail: ${{ inputs.permit_fail }}"
        echo "   Fail fast: $fail_fast"

        # Find files based on the specified path and pattern
        # Use array-based collection to handle filenames with spaces
        declare -a target_files=()

        if [ -f "$files_path" ]; then
          if [ "$repo_format" = "maven2_upload" ]; then
            echo 'Error: maven2_upload requires files_path to be' \
              'a directory, not a single file ❌'
            exit 1
          fi
          target_files=("$files_path")
        elif [ -d "$files_path" ]; then
          if [ "$file_pattern" = "*" ]; then
            readarray -d '' target_files < <(find "$files_path" -type f -print0)
          else
            readarray -d '' target_files < <(find "$files_path" \
              -name "$file_pattern" -type f -print0)
          fi
        else
          echo 'Error: Invalid files_path; must be file or directory ❌'
          exit 1
        fi

        if [ ${#target_files[@]} -eq 0 ]; then
          echo "Warning: no files found matching pattern $file_pattern ⚠️"
          echo "Path: $files_path"
          echo 'published_files=' >> "$GITHUB_OUTPUT"
          echo 'failed_files=' >> "$GITHUB_OUTPUT"
          echo 'publication_count=0' >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo 'Found files to publish 📦'
        printf '%s\n' "${target_files[@]}"
        echo ""

        # Upload each file
        for target_file in "${target_files[@]}"; do
          if [ ! -f "$target_file" ]; then
            echo "Skipping non-existent file: $target_file ⚠️"
            continue
          fi

          if upload_file "$target_file"; then
            filename=$(basename "$target_file")
            if [ -z "$published_files" ]; then
              published_files="$filename"
            else
              published_files="$published_files,$filename"
            fi
            publication_count=$((publication_count + 1))
          else
            filename=$(basename "$target_file")
            if [ -z "$failed_files" ]; then
              failed_files="$filename"
            else
              failed_files="$failed_files,$filename"
            fi
            failed_count=$((failed_count + 1))

            # Fail-fast: stop on first failure when enabled and
            # failures are not permitted
            if [ "$fail_fast" = "true" ] && \
               [ "f${{ inputs.permit_fail }}" != "ftrue" ]; then
              echo ""
              echo "🛑 Fail-fast: stopping after first failure"
              echo "   Set fail_fast: 'false' to attempt all files"
              remaining=$(( ${#target_files[@]} - publication_count \
                - failed_count ))
              if [ "$remaining" -gt 0 ]; then
                echo "   Skipped files: $remaining"
              fi
              break
            fi
          fi
          echo ""
        done

        total_found=${#target_files[@]}
        skipped_count=$((total_found - publication_count - failed_count))

        echo '📊 Publication Summary:'
        echo "  - Total files found: $total_found"
        echo "  - Successfully published: $publication_count"
        echo "  - Failed uploads: $failed_count"
        if [ "$skipped_count" -gt 0 ]; then
          echo "  - Skipped (fail-fast): $skipped_count"
        fi
        echo "  - Repository format: $repo_format"
        echo "  - Published files: $published_files"
        if [ "$failed_count" -gt 0 ]; then
          echo "  - Failed files: $failed_files"
        fi

        # Set outputs
        echo "published_files=$published_files" >> "$GITHUB_OUTPUT"
        echo "failed_files=$failed_files" >> "$GITHUB_OUTPUT"
        echo "publication_count=$publication_count" >> "$GITHUB_OUTPUT"
        echo "failed_count=$failed_count" >> "$GITHUB_OUTPUT"

        # Add to step summary
        echo '## 📦 Nexus Publisher' >> "$GITHUB_STEP_SUMMARY"
        echo "- **Server:** $nexus_url" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Repository:** $repo_name" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Repository format:** $repo_format" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Files path:** $files_path" >> "$GITHUB_STEP_SUMMARY"
        if [ -n "$upload_path" ]; then
          echo "- **Upload path:** $upload_path" >> "$GITHUB_STEP_SUMMARY"
        fi
        echo "- **Total files found:** $total_found" >> \
          "$GITHUB_STEP_SUMMARY"
        echo "- **Total files published:** $publication_count" >> \
          "$GITHUB_STEP_SUMMARY"
        echo "- **Failed uploads:** $failed_count" >> "$GITHUB_STEP_SUMMARY"
        if [ "$skipped_count" -gt 0 ]; then
          echo "- **Skipped (fail-fast):** $skipped_count" >> \
            "$GITHUB_STEP_SUMMARY"
        fi
        if [ "$publication_count" -gt 0 ]; then
          echo "- **Published files:** $published_files" >> \
            "$GITHUB_STEP_SUMMARY"
        fi
        if [ "$failed_count" -gt 0 ]; then
          echo "- **Failed files:** $failed_files" >> "$GITHUB_STEP_SUMMARY"
        fi

        # Do NOT exit with error by default if some uploads failed
        if [ "$failed_count" -gt 0 ] && \
           [ "f${{ inputs.permit_fail }}" = 'ftrue' ]; then
          echo 'Some uploads failed; for details check job output ⚠️' \
            >> "$GITHUB_STEP_SUMMARY"

        # Exit with error only when publishing failures NOT tolerated
        elif [ "$failed_count" -gt 0 ] && \
             [ "f${{ inputs.permit_fail }}" != 'ftrue' ]; then
          echo 'Some uploads failed; for details check job output ❌' \
            >> "$GITHUB_STEP_SUMMARY"
          exit 1
        else
          echo "### All content published successfully 🎉" \
            >> "$GITHUB_STEP_SUMMARY"
        fi
